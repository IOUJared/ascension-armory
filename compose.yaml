name: ascension-armory

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: conquest_gear
      POSTGRES_USER: conquest
      POSTGRES_PASSWORD: conquest
    ports:
      - "5432:5432"
    volumes:
      - conquest_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conquest -d conquest_gear"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  conquest_postgres:
    name: ascension-armory_postgres
